name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Format check
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy src tests
      - name: Test
        run: pytest --cov=soccer --cov-report=term-missing
